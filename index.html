<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 7.3 - Rustic Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Rustic Menu</h1>
    </header>

    <main>
        <section class="menu-text">
            <h2>Starters</h2>
            <p>Homemade Tomato Basil Soup - $6.00</p>
            <p>Stuffed Mushrooms - $8.00</p>

            <h2>Main Course</h2>
            <p>Herb-Roasted Chicken - $16.00</p>
            <p>Beef Stew - $18.00</p>
        </section>

        <section class="gallery">
            <h3>Галерея страв</h3>
            <div class="images-container">
                <img src="menu.jpg" alt="Dish 1" class="dish-crop circle-1">
                <img src="menu.jpg" alt="Dish 2" class="dish-crop circle-2">
                <img src="menu.jpg" alt="Dish 3" class="dish-crop circle-3">
                <img src="menu.jpg" alt="Dish 4" class="dish-crop circle-4">
            </div>
        </section>
    </main>

</body>
</html>
